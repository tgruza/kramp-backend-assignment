server:
  port: 8080

spring:
  application:
    name: product-aggregator
  threads:
    virtual:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

aggregator:
  timeout:
    catalog-ms: 500
    pricing-ms: 500
    availability-ms: 500
    customer-ms: 500

resilience4j:
  circuitbreaker:
    instances:
      productAggregator:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId:-}] %-5level %logger{36} - %msg%n"
  level:
    com.tccc.aggregator: INFO
    com.tccc.aggregator.service.upstream.mock: DEBUG
